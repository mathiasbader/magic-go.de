# Mirror of public/.htaccess for nginx (DDEV's nginx-fpm ignores .htaccess).
# Keep this file in sync with public/.htaccess — production runs Apache.

# Force www on non-local hosts (skip *.local and *.ddev.site for local dev).
# Mirrors:
#   RewriteCond %{HTTP_HOST} !^www\. [NC]
#   RewriteCond %{HTTP_HOST} !\.local$ [NC]
#   RewriteCond %{HTTP_HOST} !\.ddev\.site$ [NC]
#   RewriteRule .* http://www.%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
set $do_www_redirect 0;
if ($host !~* "^www\.")                 { set $do_www_redirect "1"; }
if ($host ~* "(\.local|\.ddev\.site)$") { set $do_www_redirect "0"; }
if ($do_www_redirect = "1") {
    return 301 http://www.$host$request_uri;
}

# Clean URL rewrites — mirror of the RewriteRules in public/.htaccess.

# /logout → /logout.php
location = /logout {
    rewrite ^ /logout.php last;
}

# Tab shortcuts (open the cards page on a specific tab)
location ~ ^/sets/?$ {
    rewrite ^ /cards/?tab=sets last;
}
location ~ ^/artists/?$ {
    rewrite ^ /cards/?tab=artists last;
}
location ~ ^/decks/?$ {
    rewrite ^ /cards/?tab=decks last;
}

# Deck detail page
location ~ ^/decks/([0-9]+)/?$ {
    rewrite ^/decks/([0-9]+)/?$ /cards/deck.php?id=$1 last;
}

# Cards subroutes
location = /cards/imports {
    rewrite ^ /cards/imports.php last;
}
location ~ ^/cards/artists?/([0-9]+)/?$ {
    rewrite ^/cards/artists?/([0-9]+)/?$ /cards/artist.php?id=$1 last;
}
location ~ ^/cards/([0-9]+)$ {
    rewrite ^/cards/([0-9]+)$ /cards/card.php?id=$1 last;
}
location ~ "^/cards/([a-f0-9-]{36})$" {
    rewrite "^/cards/([a-f0-9-]{36})$" /cards/card.php?id=$1 last;
}

# Image cache proxy
location = /img/cache {
    rewrite ^ /img/cache.php last;
}

# Scryfall API proxy (avoids CORS issues with self-signed certs)
location = /api/scryfall {
    rewrite ^ /api/scryfall.php last;
}
